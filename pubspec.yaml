name: project_manager
description: "Liquid glass Flutter task manager for the Sankar Group internship assignment."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  http: ^1.2.0
  provider: ^6.1.0
  intl: ^0.19.0
  shimmer: ^3.0.0
  flutter_slidable: ^3.1.0
  google_fonts: ^6.2.0
  lottie: ^3.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
